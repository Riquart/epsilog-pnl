<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>EPSILOG — Connexion</title>
<style>
:root{--accent:#2563eb;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
background:linear-gradient(120deg,#0f172a,#1e293b);color:var(--ink);
display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:16px;padding:34px 32px;width:340px;
box-shadow:0 20px 60px rgba(0,0,0,.35)}
h1{margin:0 0 4px;font-size:18px}
p{margin:0 0 22px;color:var(--muted);font-size:13px}
label{font-size:12px;font-weight:600;color:var(--muted)}
input{width:100%;margin-top:6px;padding:11px 12px;border:1px solid var(--line);
border-radius:9px;font-size:14px}
button{width:100%;margin-top:18px;padding:11px;border:none;border-radius:9px;
background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
button:hover{filter:brightness(1.05)}
.err{color:#dc2626;font-size:12.5px;margin-top:12px;min-height:16px}
</style></head>
<body>
<form class="card" id="fPw">
  <h1>EPSILOG SAS</h1>
  <p>Tableau de bord P&amp;L — accès protégé</p>
  <label for="pw">Mot de passe</label>
  <input type="password" id="pw" autocomplete="current-password" autofocus>
  <button type="submit">Se connecter</button>
  <div class="err" id="err"></div>
</form>
<form class="card" id="fCode" style="display:none">
  <h1>Vérification</h1>
  <p>Saisissez le code à 6 chiffres de votre application d'authentification.</p>
  <label for="code">Code</label>
  <input type="text" id="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456">
  <button type="submit">Valider</button>
  <div class="err" id="err2"></div>
</form>
<script>
document.getElementById('fPw').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const err=document.getElementById('err'); err.textContent="";
  const body=new FormData(); body.append('password', document.getElementById('pw').value);
  try{
    const r=await fetch('/api/login',{method:'POST',body});
    const j=await r.json().catch(()=>({}));
    if(r.ok){
      if(j.step==='2fa'){
        document.getElementById('fPw').style.display='none';
        document.getElementById('fCode').style.display='block';
        document.getElementById('code').focus();
      } else { location.href='/'; }
    } else { err.textContent=j.detail||"Mot de passe incorrect"; }
  }catch(_){ err.textContent="Erreur réseau"; }
});
document.getElementById('fCode').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const err=document.getElementById('err2'); err.textContent="";
  const body=new FormData(); body.append('code', document.getElementById('code').value);
  try{
    const r=await fetch('/api/2fa/verify',{method:'POST',body});
    const j=await r.json().catch(()=>({}));
    if(r.ok){ location.href='/'; }
    else{ err.textContent=j.detail||"Code incorrect"; }
  }catch(_){ err.textContent="Erreur réseau"; }
});
</script>
</body></html>
